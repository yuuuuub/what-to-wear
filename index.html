<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👗 今天穿什么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px 0 40px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    /* 温度显示 */
    .temp-display {
      text-align: center;
      margin-bottom: 16px;
    }

    .temp-value {
      font-size: 56px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .temp-unit {
      font-size: 20px;
      color: #888;
      margin-left: 4px;
    }

    /* 滑块 */
    .slider-group {
      position: relative;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #4fc3f7, #ffb74d, #ef5350);
      outline: none;
      margin: 12px 0 8px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #666;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }

    /* 输入框 */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }

    .manual-input {
      flex: 1;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-size: 16px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .manual-input:focus {
      border-color: #666;
    }

    /* 选项按钮组 */
    .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .option-btn {
      flex: 1;
      min-width: 60px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #252525;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .option-btn:hover {
      border-color: #555;
      background: #2a2a2a;
    }

    .option-btn.active {
      background: #3a3a3a;
      border-color: #888;
      color: #fff;
      font-weight: 600;
    }

    /* 推荐结果 */
    .result-section {
      margin-top: 8px;
    }

    .temp-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .badge-hot  { background: #5d1a1a; color: #ef5350; }
    .badge-warm { background: #3e2a00; color: #ffb74d; }
    .badge-cool { background: #0d2b3e; color: #4fc3f7; }
    .badge-cold { background: #1a1a3e; color: #90caf9; }
    .badge-freeze { background: #1a1a2e; color: #b39ddb; }

    .outfit-list {
      list-style: none;
    }

    .outfit-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #222;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .outfit-emoji {
      font-size: 28px;
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .outfit-text {
      flex: 1;
    }

    /* 单品搭配 */
    .item-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .item-box {
      background: #222;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .item-box-emoji {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
    }

    .item-box-label {
      font-size: 11px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .item-box-value {
      font-size: 14px;
      font-weight: 600;
      color: #ddd;
    }

    /* 提醒 */
    .alert {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
    }

    .alert-rain {
      background: rgba(79, 195, 247, 0.1);
      border: 1px solid rgba(79, 195, 247, 0.25);
      color: #4fc3f7;
    }

    .alert-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .hidden {
      display: none;
    }

    /* 响应式 */
    @media (min-width: 768px) {
      body {
        align-items: center;
        padding: 40px;
      }
      .container {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>👗 今天穿什么</h1>

    <!-- 性别选择 -->
    <div class="card">
      <div class="card-title">性别</div>
      <div class="option-group" id="genderGroup">
        <button class="option-btn active" data-value="男" onclick="selectOption('gender', '男', this)">🙋 男</button>
        <button class="option-btn" data-value="女" onclick="selectOption('gender', '女', this)">🙋‍♀️ 女</button>
      </div>
    </div>

    <!-- 温度选择 -->
    <div class="card">
      <div class="card-title">🌡️ 当前温度</div>
      <div class="temp-display">
        <span class="temp-value" id="tempDisplay">25</span><span class="temp-unit">°C</span>
      </div>
      <div class="slider-group">
        <input type="range" id="tempSlider" min="-15" max="45" value="25" step="1"
               oninput="updateTemp(this.value)">
      </div>
      <div class="slider-labels">
        <span>-15°C</span><span>0°C</span><span>15°C</span><span>30°C</span><span>45°C</span>
      </div>
      <div class="input-row" style="margin-top: 12px;">
        <input type="number" class="manual-input" id="tempInput" value="25"
               placeholder="输入温度..."
               oninput="syncTempFromInput(this.value)">
      </div>
    </div>

    <!-- 天气状况 -->
    <div class="card">
      <div class="card-title">☁️ 天气状况</div>
      <div class="option-group" id="weatherGroup">
        <button class="option-btn active" data-value="晴" onclick="selectOption('weather', '晴', this)">☀️ 晴</button>
        <button class="option-btn" data-value="阴" onclick="selectOption('weather', '阴', this)">☁️ 阴</button>
        <button class="option-btn" data-value="雨" onclick="selectOption('weather', '雨', this)">🌧️ 雨</button>
        <button class="option-btn" data-value="雪" onclick="selectOption('weather', '雪', this)">❄️ 雪</button>
        <button class="option-btn" data-value="大风" onclick="selectOption('weather', '风', this)">💨 大风</button>
      </div>
    </div>

    <!-- 场合 -->
    <div class="card">
      <div class="card-title">🎯 场合</div>
      <div class="option-group" id="occasionGroup">
        <button class="option-btn active" data-value="上班" onclick="selectOption('occasion', '上班', this)">💼 上班</button>
        <button class="option-btn" data-value="约会" onclick="selectOption('occasion', '约会', this)">💕 约会</button>
        <button class="option-btn" data-value="运动" onclick="selectOption('occasion', '运动', this)">🏃 运动</button>
        <button class="option-btn" data-value="居家" onclick="selectOption('occasion', '居家', this)">🏠 居家</button>
        <button class="option-btn" data-value="逛街" onclick="selectOption('occasion', '逛街', this)">🛍️ 逛街</button>
      </div>
    </div>

    <!-- 推荐结果 -->
    <div class="card" id="resultCard">
      <div class="card-title">✨ 今日推荐穿搭</div>
      <div id="resultContent"></div>
    </div>
  </div>

  <script>
    // 状态
    const state = {
      gender: '男',
      weather: '晴',
      occasion: '上班',
      temperature: 25
    };

    function selectOption(type, value, el) {
      state[type] = value;
      const group = el.parentElement;
      group.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function updateTemp(value) {
      value = parseInt(value);
      state.temperature = value;
      document.getElementById('tempDisplay').textContent = value;
      document.getElementById('tempInput').value = value;
      render();
    }

    function syncTempFromInput(value) {
      let v = parseInt(value);
      if (isNaN(v)) return;
      v = Math.max(-15, Math.min(45, v));
      state.temperature = v;
      document.getElementById('tempDisplay').textContent = v;
      document.getElementById('tempSlider').value = v;
      render();
    }

    // 获取温度等级
    function getTempLevel(t) {
      if (t > 30) return { level: 'hot', label: '炎热', emoji: '🔥', badgeClass: 'badge-hot' };
      if (t >= 20) return { level: 'warm', label: '温暖', emoji: '🌤️', badgeClass: 'badge-warm' };
      if (t >= 10) return { level: 'cool', label: '凉爽', emoji: '🍂', badgeClass: 'badge-cool' };
      if (t >= 0)  return { level: 'cold', label: '寒冷', emoji: '🥶', badgeClass: 'badge-cold' };
      return { level: 'freeze', label: '极寒', emoji: '🧊', badgeClass: 'badge-freeze' };
    }

    // 推荐数据
    const outfits = {
      hot: {
        outfits: [
          { emoji: '👕', text: '短袖T恤 + 短裤' },
          { emoji: '👗', text: '连衣裙 / 吊带裙' },
          { emoji: '🎽', text: '背心 + 休闲短裤' },
          { emoji: '🩴', text: '棉麻阔腿裤 + 凉鞋' }
        ],
        items: { top: '短袖T恤 / 吊带', bottom: '短裤 / 短裙', accessory: '墨镜 / 遮阳帽', shoes: '凉鞋 / 帆布鞋' },
        tips: '轻薄透气为主，注意防晒'
      },
      warm: {
        outfits: [
          { emoji: '👕', text: 'T恤 + 长裤' },
          { emoji: '🧥', text: '薄外套 + T恤' },
          { emoji: '👔', text: '衬衫 + 休闲裤' },
          { emoji: '👗', text: '中长裙 + 薄针织衫' }
        ],
        items: { top: 'T恤 / 薄衬衫', bottom: '牛仔裤 / 休闲裤', accessory: '薄丝巾 / 帽子', shoes: '运动鞋 / 帆布鞋' },
        tips: '早晚微凉可备薄外套'
      },
      cool: {
        outfits: [
          { emoji: '🧥', text: '卫衣 + 外套' },
          { emoji: '🧣', text: '风衣 + 针织衫' },
          { emoji: '👔', text: '夹克 + 长袖衬衫' },
          { emoji: '🧶', text: '毛衣 + 长裤' }
        ],
        items: { top: '卫衣 / 针织衫', bottom: '厚长裤 / 牛仔裤', accessory: '围巾 / 帽子', shoes: '运动鞋 / 马丁靴' },
        tips: '洋葱式穿搭，方便随时增减'
      },
      cold: {
        outfits: [
          { emoji: '🧥', text: '羽绒服 + 毛衣' },
          { emoji: '🧣', text: '厚外套 + 围巾' },
          { emoji: '🧤', text: '棉服 + 保暖内衣' },
          { emoji: '👢', text: '长大衣 + 高领毛衣' }
        ],
        items: { top: '毛衣 / 保暖内衣', bottom: '加绒裤 / 厚牛仔裤', accessory: '围巾 / 手套', shoes: '雪地靴 / 靴子' },
        tips: '注意保暖，重点护住颈部和脚踝'
      },
      freeze: {
        outfits: [
          { emoji: '🧥', text: '超厚羽绒服' },
          { emoji: '🧤', text: '帽子 + 手套必备' },
          { emoji: '🧣', text: '厚围巾 + 口罩' },
          { emoji: '👢', text: '加绒雪地靴' }
        ],
        items: { top: '超厚羽绒服 / 保暖内衣', bottom: '加绒加厚裤', accessory: '帽子 / 手套 / 围巾', shoes: '加绒雪地靴' },
        tips: '极寒天气尽量减少户外停留'
      }
    };

    // 场合调整
    function adjustByOccasion(items, occasion, gender) {
      let adjusted = { ...items };

      if (occasion === '上班') {
        adjusted.top = (gender === '男') ? '衬衫 / POLO衫' : '衬衫 / 简约上衣';
        adjusted.bottom = (gender === '男') ? '西裤 / 休闲长裤' : '西裤 / 半裙';
        adjusted.accessory += ' / 手表';
        adjusted.shoes = '皮鞋 / 乐福鞋';
      } else if (occasion === '运动') {
        adjusted.top = '速干T恤 / 运动背心';
        adjusted.bottom = '运动短裤 / 瑜伽裤';
        adjusted.shoes = '跑鞋 / 训练鞋';
        adjusted.accessory = '运动手表 / 发带';
      } else if (occasion === '居家') {
        adjusted.top = '家居服 / 宽松T恤';
        adjusted.bottom = '家居裤 / 睡裤';
        adjusted.shoes = '拖鞋';
        adjusted.accessory = '';
      } else if (occasion === '约会') {
        adjusted.top = (gender === '男') ? '休闲衬衫 / 针织衫' : '连衣裙 / 精致上衣';
        adjusted.bottom = (gender === '男') ? '修身长裤' : '半身裙 / 阔腿裤';
        adjusted.shoes = (gender === '男') ? '休闲皮鞋' : '高跟鞋 / 短靴';
        adjusted.accessory += ' / 香水';
      } else if (occasion === '逛街') {
        adjusted.shoes = '舒适运动鞋 / 平底鞋';
        adjusted.accessory += ' / 背包';
      }

      return adjusted;
    }

    function render() {
      const t = state.temperature;
      const tempInfo = getTempLevel(t);
      const outfitData = outfits[tempInfo.level];
      const adjusted = adjustByOccasion(outfitData.items, state.occasion, state.gender);

      const isRain = state.weather === '雨';
      const isSnow = state.weather === '雪';
      const isWind = state.weather === '大风';

      let html = '';

      // 温度标签
      html += `<span class="temp-badge ${tempInfo.badgeClass}">${tempInfo.emoji} ${tempInfo.label} · ${t}°C</span>`;

      // 穿搭推荐
      html += `<ul class="outfit-list">`;
      outfitData.outfits.forEach(o => {
        html += `<li class="outfit-item"><span class="outfit-emoji">${o.emoji}</span><span class="outfit-text">${o.text}</span></li>`;
      });
      html += `</ul>`;

      // 单品搭配建议
      html += `<div class="card-title" style="margin-top: 18px;">👔 单品搭配建议</div>`;
      html += `<div class="item-grid">`;

      const itemDefs = [
        { label: '上装', icon: '👕', value: adjusted.top },
        { label: '下装', icon: '👖', value: adjusted.bottom },
        { label: '鞋', icon: '👟', value: adjusted.shoes },
        { label: '配饰', icon: '👜', value: adjusted.accessory || '—' }
      ];

      itemDefs.forEach(item => {
        html += `<div class="item-box">
          <span class="item-box-emoji">${item.icon}</span>
          <div class="item-box-label">${item.label}</div>
          <div class="item-box-value">${item.value}</div>
        </div>`;
      });

      html += `</div>`;

      // 小贴士
      html += `<p style="margin-top: 14px; font-size: 13px; color: #888;">💡 ${outfitData.tips}</p>`;

      // 下雨提醒
      if (isRain || isSnow) {
        const rainEmoji = isRain ? '🌂' : '☂️';
        const rainText = isRain ? '今天有雨，记得带伞哦！' : '今天有雪，注意防滑保暖！';
        html += `<div class="alert alert-rain" style="margin-top: 14px;">
          <span class="alert-icon">${rainEmoji}</span>
          <span>${rainText}</span>
        </div>`;
      }

      if (isWind && !isRain && !isSnow) {
        html += `<div class="alert alert-rain" style="margin-top: 14px;">
          <span class="alert-icon">🌬️</span>
          <span>今天风大，建议穿防风外套并固定好帽子！</span>
        </div>`;
      }

      document.getElementById('resultContent').innerHTML = html;
    }

    // 初始渲染
    render();
  </script>
</body>
</html>
